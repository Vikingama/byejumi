<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>event loop 3</title>
</head>

<body>
    每一个 event loop 都有着众多不同的"任务来源"，这些"任务来源"能够保证其中的 task 能够有序的执行...
    <hr> 在每一轮事件循环结束之后，浏览器可以自行选择将哪一个 source 当中的 task 加入到执行队列当中...
    <hr> task 是严格按照时间顺序压栈和执行的，浏览器能够使得 JavaScript 内部任务与 DOM 任务能够有序的执行...
    <hr> 当一个 task 执行结束后，在下一个 task 执行开始前，浏览器可以对页面进行重新渲染；
    <br> 每一个 task 都是需要分配的，例如从用户的点击操作到一个点击事件，渲染 HTML 文档...
</body>
<script>
    console.log("script start"); // 1
    setTimeout(() => {
        console.log("timed out"); // 5
    }, 0);
    Promise.resolve().then(() => {
        console.log("promise first"); // 3
    }).then(() => {
        console.log("promise last"); // 4
    });
    console.log("script end"); // 2
</script>

</html>
