<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>scroll motive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            transition: all 0.3s;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            opacity: 0;
        }

        div {
            width: 100%;
            height: 100vh;
        }

        div:nth-of-type(even) {
            background: cyan;
        }

        div:nth-of-type(odd) {
            background: plum;
        }
    </style>
</head>

<body>
    <div class="do-something">

    </div>
    <div class="do-something">

    </div>
    <div class="do-something">

    </div>
</body>
<script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.js"></script>
<script>
    let doc = document.documentElement || document.body,
        initPos = 0, initAdd = 0, times = 0,
        divEles = [...document.querySelectorAll(".do-something")],
        clht = divEles[0].clientHeight,
        afs, stl, orient;

    doc.addEventListener("mousewheel", noscroll, false);

    function noscroll(e) {
        initPos++;
        if (initPos > 30) {
            console.log("stop");
            initPos = 0;
            if (e.wheelDelta < 0) {
                times--;
            } else if (e.wheelDelta > 0) {
                times++;
            }
            // motiveAniFra();
            // motiveSetInt();
            $("html,body").animate({ scrollTop: clht * times }, 300);
        }
        e.preventDefault();
    }

    function motiveAniFra() {
        cancelAnimationFrame(afs);
        afs = requestAnimationFrame(function fn() {
            if (doc.scrollTop > clht) {
                console.log("done");
                cancelAnimationFrame(afs);
            } else {
                doc.scrollBy(0, 1);
                afs = requestAnimationFrame(fn);
            }
        })
    }

    function motiveSetInt() {
        clearInterval(stl);
        stl = setInterval(() => {
            initAdd++;
            if (doc.scrollTop > clht) {
                console.log("done");
                clearInterval(stl);
            }
            doc.scrollBy(0, initAdd);
        }, 30);
    }
</script>

</html>
