</body>
<script>
    function speak() {
        console.log(this);
        console.log(this.name);
        console.log("···");
    }
    var name = "window name",
        sample = {
            name: "sample name",
            speak: speak
        },
        speakPark = sample.speak;
    speak(); // this - window
    sample.speak(); // this - sample
    speakPark(); // this - window
    setTimeout(function () {
        sample.speak(); // this - sample
    }, 100);
    setTimeout(sample.speak, 300); // this - window
    console.log("🙃🙃🙃");
    speak.call("god"); // 装箱...
    console.log("🙃🙃🙃");
</script>
