<script>
    function Lcy(el, images, properties) {
        if (!el) {
            return;
        }
        if (!images || !images.length) {
            return;
        }
        // 📌📌📌
        this.el = el;
        this.images = images;
        this.transitionTime = properties.transitionTime;
        this.swipeTime = properties.transitionTime;
        // 📌📌📌
        this.index = 1;
        this.animateSwitcher = false;
        // 📌📌📌
        this.init();
    }

</script>
