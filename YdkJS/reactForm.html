<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>React Form</title>
    <style>
        xmp {
            border: 1px dashed black;
            font-family: "Microsoft Yahei";
        }
    </style>
</head>

<body>
    在表单处理方面，React 推荐在绝大多数的情况下都使用受控组件，这样可以保证表单数据在组件的 state 管理之下...
    <xmp id="code1"></xmp>
    React 元素中的事件处理也是 React 内部的抽象封装；在 JSX 中写出来，看上去差不多，并不是 HTML 原生的事件属性...
    <xmp id="code2"></xmp>
</body>
<script>
    document.querySelector("#code1").innerHTML =
        `
    如果需要实时获取表单元素的数据，推荐使用受控组件；反之可使用非受控组件，通过事件获取表单元素的值...
    class ControlledInput extends React.Component {
        constructor(props) {
            super(props);
            this.state = {
                value: ""
            }
        }
        handleChange(event) {
            this.setState({
                value: event.target.value
            })
        }
        render() {
            return <input type='text' value={this.state.value} onChange={e => this.handleChange(e)}/>;
        }
    }
    `;
    document.querySelector("#code2").innerHTML =
        `
    class MarkdownEditor extends React.Component {
        constructor(props) {
            super(props);
            this.handleChange = this.handleChange.bind(this);
            this.state = {
                value: MD_CONTENT
            };
        }
        handleChange(e) {
            this.setState({
                value: e.target.value
            })
        }
        getRawMarkup() {
            let md = new Remarkable();
            return {
                _html: md.render(this.state.value)
            }
        }
        render() {
            return (
                <div className="MarkdownEditor">
                    <div className="left">
                        <h3>Input</h3>
                        <textarea onChange={this.handleChange} defaultValue={this.state.value}/>
                    </div>
                    <div className="right">
                        <h3>Output</h3>
                        <div className="content" dangerouslySetInnerHTML={this.getRawMarkup()}/>
                    </div>
                </div>
            )
        }
    }
    `;
</script>

</html>
